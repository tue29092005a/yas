name: SonarQube Cloud Scan with Dynamic Matrix

on:
  push:
    branches:
      - '**'
      - 'main'
  pull_request:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Job 1: Detect Changes
  # ============================================================================
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
      tested-modules: ${{ steps.set-tested.outputs.modules }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            media: 'media/**'
            product: 'product/**'
            cart: 'cart/**'
            location: 'location/**'
            order: 'order/**'
            customer: 'customer/**'
            rating: 'rating/**'
            inventory: 'inventory/**'
            tax: 'tax/**'
            search: 'search/**'
            common-library: 'common-library/**'

      - name: Set tested modules
        id: set-tested
        run: |
          # Define modules that have test code
          TESTED_MODULES='["tax","customer","order","product"]'
          echo "modules=$TESTED_MODULES" >> $GITHUB_OUTPUT
          echo "Tested modules: $TESTED_MODULES"

  # ============================================================================
  # Job 2: Build & Test with Dynamic Matrix
  # ============================================================================
  build-and-test:
    name: Test Module [${{ matrix.module }}]
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.modules != '[]' && needs.detect-changes.outputs.modules != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests and generate Jacoco coverage for ${{ matrix.module }}
        run: |
          mvn clean \
            org.jacoco:jacoco-maven-plugin:prepare-agent \
            test \
            org.jacoco:jacoco-maven-plugin:report \
            -pl ${{ matrix.module }} \
            -am \
            -Dmaven.test.failure.ignore=true \
            --batch-mode \
            --fail-at-end

      - name: Upload Jacoco coverage report for ${{ matrix.module }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.module }}
          path: ${{ matrix.module }}/target/site/jacoco/jacoco.xml
          retention-days: 1 
          if-no-files-found: warn

  # ============================================================================
  # Job 3: SonarQube Cloud Scan
  # ============================================================================
  sonarqube-scan:
    name: SonarQube Cloud Scan
    needs: [detect-changes, build-and-test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Create coverage output directory
        run: mkdir -p coverage-reports

      - name: Download Jacoco coverage reports
        if: ${{ needs.detect-changes.outputs.modules != '[]' && needs.detect-changes.outputs.modules != '' }}
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: jacoco-report-*

      - name: Compile project for SonarQube
        run: |
          mvn clean package \
            -DskipTests \
            -Dmaven.main.skip=false \
            --batch-mode \
            --fail-at-end

      - name: Prepare SonarQube parameters
        id: sonar-params
        run: |
          TESTED_MODULES='["tax","customer","order","product"]'
          COVERAGE_FILES=""
          
          echo "Looking for coverage files from tested modules..."
          
          for module in $(echo $TESTED_MODULES | jq -r '.[]'); do
            coverage_file="coverage-reports/jacoco-report-${module}/jacoco.xml"
            if [ -f "$coverage_file" ]; then
              echo "✓ Found coverage for module: $module"
              if [ -z "$COVERAGE_FILES" ]; then
                COVERAGE_FILES="$coverage_file"
              else
                COVERAGE_FILES="$COVERAGE_FILES,$coverage_file"
              fi
            else
              echo "⚠ Coverage not found for module: $module (tests may have been skipped)"
            fi
          done
          
          if [ -z "$COVERAGE_FILES" ]; then
            echo "::notice::No coverage reports found - SonarQube will analyze without coverage"
            echo "coverage-paths=" >> $GITHUB_OUTPUT
          else
            echo "::notice::Using coverage reports: $COVERAGE_FILES"
            echo "coverage-paths=$COVERAGE_FILES" >> $GITHUB_OUTPUT
          fi

      - name: List downloaded files (Debug)
        run: |
          echo "=== Coverage Reports Structure ==="
          ls -R coverage-reports 2>/dev/null || echo "No coverage directory"

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v2.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=tue29092005a_yas
            -Dsonar.organization=tue29092005a
            ${{ steps.sonar-params.outputs.coverage-paths != '' && format('-Dsonar.coverage.jacoco.xmlReportPaths={0}', steps.sonar-params.outputs.coverage-paths) || '' }}
            -Dsonar.java.binaries=**/target/classes
            -Dsonar.exclusions=**/src/test/**,**/config/**,**/dto/**,**/entity/**,**/*Exception.java

      - name: SonarQube scan completed
        run: |
          echo "::notice::SonarQube Cloud scan completed successfully"
          echo "View results at: https://sonarcloud.io/project/overview?id=tue29092005a_yas"
