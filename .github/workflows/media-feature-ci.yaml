name: Media Service - Feature CI

on:
  push:
    branches:
      - 'test_feature_media*'
      - 'features/media/*'
    paths:
      - 'media/**'
      - '.github/workflows/actions/action.yaml'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  test_and_scan:
    name: Security Scan & Unit Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java/Maven Environment
        uses: ./.github/workflows/actions
        id: java-setup

      # Thêm cache để không phải tải lại các dependency của Maven cho mỗi lần chạy
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build shared dependencies
        run: mvn clean install -pl common-library -am -DskipTests
        env:
          JAVA_HOME: ${{ steps.java-setup.outputs.JAVA_HOME }}

      # Đã gộp bước Test và Coverage bị trùng lặp
      - name: Run JUnit Tests & Generate Coverage
        run: mvn clean test -pl media -am
        env:
          JAVA_HOME: ${{ steps.java-setup.outputs.JAVA_HOME }}

      - name: Snyk Security Scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_HOME: ${{ steps.java-setup.outputs.JAVA_HOME }}
          NODE_OPTIONS: --max-old-space-size=4096
          _JAVA_OPTIONS: "-Xmx2g -Xms512m"
        with:
          args: --severity-threshold=high --file=media/pom.xml --debug

  build:
    name: Build Media Service
    needs: test_and_scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java/Maven Environment
        uses: ./.github/workflows/actions
        id: java-setup

      # Dùng lại cache ở job trên để tăng tốc độ build
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Maven Build Command
        run: mvn clean install -pl media -am -DskipTests
        env:
          JAVA_HOME: ${{ steps.java-setup.outputs.JAVA_HOME }}